<!-- socialuser/templates/socialuser/includes/member_nav.html -->
<!-- 會員專區水平標籤頁導航菜單 -->
{% load static %}

<div class="member-nav-wrapper mb-4">
    <div class="member-nav-container">
        <a href="{% url 'socialuser:profile' %}" 
           class="member-nav-item {% if request.path == '/socialuser/' or 'profile' in request.path and 'loyalty' not in request.path and 'orders' not in request.path %}active{% endif %}">
            <i class="fas fa-user fa-fw"></i>
            <span>帳戶資料</span>
        </a>
        <a href="{% url 'socialuser:loyalty_dashboard' %}" 
           class="member-nav-item {% if 'loyalty' in request.path %}active{% endif %}">
            <i class="fas fa-crown fa-fw"></i>
            <span>會員積分</span>
        </a>
        <a href="{% url 'socialuser:profile-orders' %}" 
           class="member-nav-item {% if 'orders' in request.path %}active{% endif %}">
            <i class="fas fa-history fa-fw"></i>
            <span>訂單紀錄</span>
        </a>
    </div>
</div>
