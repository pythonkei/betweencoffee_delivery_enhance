# Render 一鍵部署配置（Blueprint）
# 用於 Between Coffee 咖啡店外帶網站
#
# ⚠️ 注意：Render Blueprint 僅支援 web service 類型
# PostgreSQL 和 Cron Job 需手動建立（請參考部署指南）
#
# 詳細部署指南：docs/guides/RENDER_DEPLOY_GUIDE.md

services:
  # ==================== Web 服務 ====================
  - type: web
    name: betweencoffee
    env: python
    region: singapore  # 新加坡節點，亞洲訪問最快
    plan: free
    branch: main
    buildCommand: |
      # 安裝 Rust（rpds-py 需要 Rust 編譯，且 Render 使用 Python 3.14 無 pre-built wheel）
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable 2>&1 &&
      export PATH="$HOME/.cargo/bin:$PATH" &&
      export CARGO_HOME="$HOME/.cargo" &&
      pip install --upgrade pip &&
      # 下載 maturin pre-built binary（rpds-py 的 build backend）
      curl -L https://github.com/PyO3/maturin/releases/download/v1.7.4/maturin-x86_64-unknown-linux-gnu.tar.gz -o /tmp/maturin.tar.gz 2>&1 &&
      tar xzf /tmp/maturin.tar.gz -C /tmp 2>&1 &&
      export PATH="/tmp:$PATH" &&
      # 安裝 rpds-py（使用 --no-build-isolation 以使用我們安裝的 Rust 和 maturin）
      CARGO_HOME="$HOME/.cargo" pip install --no-build-isolation rpds-py==0.18.0 2>&1 &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      # 將 media 檔案複製到 staticfiles 目錄，確保產品圖片在生產環境中可存取
      mkdir -p staticfiles/media &&
      cp -r media/* staticfiles/media/ 2>/dev/null || echo "No media files to copy"
    startCommand: |
      python manage.py migrate --noinput || echo "Migration failed, continuing anyway..." &&
      gunicorn betweencoffee_delivery.wsgi:application --bind 0.0.0.0:$PORT --workers=2 --timeout=120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: betweencoffee_delivery.settings
      - key: SECRET_KEY
        generateValue: true  # Render 自動生成
      - key: DEBUG
        value: "False"
      - key: IS_RENDER
        value: "True"
      # DATABASE_URL 需手動設定（建立 PostgreSQL 後取得 Internal Database URL）
      - key: DATABASE_URL
        sync: false
      - key: RENDER_EXTERNAL_HOSTNAME
        value: onrender.com
      # === 郵件配置（Gmail SMTP，可選）===
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Between Coffee <pythonkei@gmail.com>"
      # === 支付配置（可選，展示用可留空）===
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      # === 社交登入配置（可選）===
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_SECRET
        sync: false
      - key: OAUTH_FACEBOOK_CLIENT_ID
        sync: false
      - key: OAUTH_FACEBOOK_SECRET
        sync: false
