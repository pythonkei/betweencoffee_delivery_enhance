# Render 一鍵部署配置（Blueprint）
# 用於 Between Coffee 咖啡店外帶網站
#
# 詳細部署指南：docs/guides/RENDER_DEPLOY_GUIDE.md

databases:
  # ==================== PostgreSQL 資料庫 ====================
  - name: betweencoffee-db
    plan: free
    region: singapore
    postgresMajorVersion: 15
    ipAllowList: []  # 僅允許 Render 內部網路訪問

services:
  # ==================== Web 服務 ====================
  - type: web
    name: betweencoffee
    env: docker
    region: singapore  # 新加坡節點，亞洲訪問最快
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: betweencoffee_delivery.settings
      - key: SECRET_KEY
        generateValue: true  # Render 自動生成
      - key: DEBUG
        value: "False"
      - key: IS_RENDER
        value: "True"
      # 自動從 PostgreSQL 服務取得 Internal Database URL
      - key: DATABASE_URL
        fromDatabase:
          name: betweencoffee-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        value: betweencoffee-delivery-enhance-v1.onrender.com
      # === 郵件配置（Gmail SMTP，可選）===
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Between Coffee <pythonkei@gmail.com>"
      # === 支付配置（可選，展示用可留空）===
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      # === 社交登入配置（可選）===
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_SECRET
        sync: false
      - key: OAUTH_FACEBOOK_CLIENT_ID
        sync: false
      - key: OAUTH_FACEBOOK_SECRET
        sync: false
